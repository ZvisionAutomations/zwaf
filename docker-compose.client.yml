# docker-compose.client.yml — Stack minima para deploy no cliente
# Stack: postgres + redis + evolution_api + zwaf_api
# SEM: prometheus, grafana (observabilidade fica no Langfuse cloud)
#
# Deploy:
#   docker compose -f docker-compose.client.yml --env-file .env.livia-raiz-vital up -d

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - zwaf-postgres-data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - zwaf-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # Obrigatorio para v2.3.7 — sem isso WhatsApp nao conecta
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035194821"
      # Banco — Evolution usa schema proprio dentro do mesmo postgres
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${EVOLUTION_POSTGRES_DB:-evolution}
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Webhook global -> ZWAF API (apenas messages.upsert)
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://zwaf-api:8000/v1/webhook/${EVOLUTION_WEBHOOK_TENANT:-livia-raiz-vital}"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_SEND_LIST: "false"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_CONTACTS_UPDATE: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "false"
      WEBHOOK_EVENTS_CALL: "false"
      # Cache Redis — evita loop de "redis disconnected"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution_raiz_vital
      CACHE_REDIS_SAVE_INSTANCES: "false"
    volumes:
      - zwaf-evolution-data:/evolution/instances
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  zwaf-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      ZWAF_TENANTS: ${ZWAF_TENANTS}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      WA_NUMBER_1: ${WA_NUMBER_1}
      WA_INSTANCE_1: ${WA_INSTANCE_1}
      WA_NUMBER_2: ${WA_NUMBER_2:-}
      WA_INSTANCE_2: ${WA_INSTANCE_2:-}
      WA_WARMUP_START_DATE: ${WA_WARMUP_START_DATE}
      REPORT_WA_DEST_NUMBER: ${REPORT_WA_DEST_NUMBER:-}
      REPORT_WA_GROUP_ID: ${REPORT_WA_GROUP_ID:-}
      CAIO_PERSONAL_WA_NUMBER: ${CAIO_PERSONAL_WA_NUMBER:-}
      INITIAL_STOCK_NEW_WOMAN: ${INITIAL_STOCK_NEW_WOMAN:-510}
      INITIAL_STOCK_ALPHA_PULSE: ${INITIAL_STOCK_ALPHA_PULSE:-275}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL}
      ASAAS_WEBHOOK_AUTH_TOKEN: ${ASAAS_WEBHOOK_AUTH_TOKEN}
      ASAAS_USER_AGENT: ${ASAAS_USER_AGENT}
      ASAAS_RETURN_URL: ${ASAAS_RETURN_URL}
      ASAAS_COMPLETION_URL: ${ASAAS_COMPLETION_URL}
      ASAAS_DEFAULT_CUSTOMER_CPF_CNPJ: ${ASAAS_DEFAULT_CUSTOMER_CPF_CNPJ:-}
      ESCALATION_PHONE: ${ESCALATION_PHONE}
      ZWAF_API_KEYS: ${ZWAF_API_KEYS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./tenants:/app/tenants:ro

volumes:
  zwaf-postgres-data:
  zwaf-redis-data:
  zwaf-evolution-data:
