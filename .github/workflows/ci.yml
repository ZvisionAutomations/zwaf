name: ZWAF CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "caio/**", "soier/**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: .

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  harnesses:
    name: Harnesses
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zwaf
          POSTGRES_PASSWORD: zwaf_test
          POSTGRES_DB: zwaf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zwaf -d zwaf_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      REDIS_URL: redis://localhost:6379/0
      DATABASE_URL: postgresql://zwaf:zwaf_test@localhost:5432/zwaf_test
      OPENAI_API_KEY: sk-test-placeholder
      EVOLUTION_API_URL: http://localhost:8080
      EVOLUTION_API_KEY: test_key
      WA_NUMBER_1: "5511999999999"
      WA_INSTANCE_1: test-instance-1
      WA_NUMBER_2: "5511999999998"
      WA_INSTANCE_2: test-instance-2
      WA_WARMUP_START_DATE: "2025-01-01"
      ABACATE_PAY_KEY: test_abacate_key
      ESCALATION_PHONE: "5511980142484"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: |
          pip install psycopg2-binary
          PGPASSWORD=zwaf_test psql -h localhost -U zwaf -d zwaf_test -f infra/migrations/001_initial_schema.sql

      - name: Throttle harness
        run: python -m harnesses.throttle_harness

      - name: Warm-up harness
        run: python -m harnesses.warmup_harness

      - name: Conversation harness
        run: python -m harnesses.conversation_harness --all

      - name: Evaluation harness
        run: python -m harnesses.evaluation_harness --tenant livia-raiz-vital

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zwaf
          POSTGRES_PASSWORD: zwaf_test
          POSTGRES_DB: zwaf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zwaf -d zwaf_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      REDIS_URL: redis://localhost:6379/0
      DATABASE_URL: postgresql://zwaf:zwaf_test@localhost:5432/zwaf_test
      OPENAI_API_KEY: sk-test-placeholder
      EVOLUTION_API_URL: http://localhost:8080
      EVOLUTION_API_KEY: test_key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: harnesses

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: zwaf:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
